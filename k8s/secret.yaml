apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-gantt
  labels:
    app: ai-gantt
    version: "0.1.0"
    managed-by: kustomize
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  JWT_SECRET: "CHANGE-ME-GENERATE-SECRET"
  # Base64-encoded API key — replace with real value
  OPENAI_API_KEY: "sk-placeholder-replace-in-prod"
