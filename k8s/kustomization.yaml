apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-gantt

commonLabels:
  app: ai-gantt
  version: "0.1.0"
  managed-by: kustomize

resources:
  - configmap.yaml
  - secret.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

# For production, use: kustomize edit set image biotech-backend=myregistry/backend:v1.0
images:
  - name: biotech-backend
    newName: biotech-backend
    newTag: latest
  - name: biotech-frontend
    newName: biotech-frontend
    newTag: latest
