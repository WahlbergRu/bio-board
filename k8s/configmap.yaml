apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-gantt
  labels:
    app: ai-gantt
    version: "0.1.0"
    managed-by: kustomize
data:
  OPENAI_BASE_URL: "https://coding-intl.dashscope.aliyuncs.com/v1"
  OPENAI_MODEL: "kimi-k2.5"
  APP_ENV: "production"
  # OPENAI_API_KEY moved to Secret (app-secrets)
  # JWT_SECRET moved to Secret (app-secrets)
