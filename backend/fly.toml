app = "bio-board"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/app/data"
  HOST = "0.0.0.0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
